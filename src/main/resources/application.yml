server:
  port: 8080

spring:
  application:
    name: knowledge-assistant

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/knowledge_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3000ms

  cache:
    type: redis
    redis:
      time-to-live: 300000ms

  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        enabled: true
        options:
          model: deepseek-chat
          temperature: 0.7
      embedding:
        enabled: true
        api-key: ${SILICONFLOW_API_KEY}
        base-url: ${SILICONFLOW_BASE_URL:https://api.siliconflow.cn}
        options:
          model: BAAI/bge-large-zh-v1.5
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: 6334
        collection-name: knowledge_collection
        initialize-schema: true

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.assistant: DEBUG
    org.springframework.ai: DEBUG

app:
  password: ${APP_PASSWORD}
